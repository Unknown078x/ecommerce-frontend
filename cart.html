<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Shopping Cart</title>

  <link
    rel="stylesheet"
    href="styles/main.css"
  />

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
      ShopEase
    </div>

    <nav class="navbar">

      <ul class="nav-links">

        <li>
          <a href="index.html">
            Home
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <!-- CART -->
  <section class="cart-section">

    <div class="cart-top">

      <h1 class="cart-title">
        Your Cart
      </h1>

      <a
        href="index.html"
        class="continue-shopping-btn"
      >
        Continue Shopping
      </a>

    </div>

    <!-- CART ITEMS -->
    <div
      class="cart-items"
      id="cartItems"
    >

    </div>

    <!-- SUMMARY -->
    <div class="cart-summary">

      <h2>

        Total:
        $

        <span id="cartTotal">
          0
        </span>

      </h2>

      <button
        id="checkoutBtn"
        class="checkout-btn"
      >
        Proceed to Checkout
      </button>

    </div>

  </section>

  <script
  type="module"
  src="scripts/cart-page.js"
></script>

</body>

</html>
