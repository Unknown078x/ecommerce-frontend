<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Authentication</title>

  <link
    rel="stylesheet"
    href="styles/main.css"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
      ShopEase
    </div>

    <nav class="navbar">

      <ul class="nav-links">

        <li>
          <a href="index.html">
            Home
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <!-- AUTH -->
  <section class="auth-section">

    <div class="auth-container">

      <!-- TOGGLE -->
      <div class="auth-tabs">

        <button
          class="tab-btn active"
          id="loginTab"
        >
          Login
        </button>

        <button
          class="tab-btn"
          id="signupTab"
        >
          Sign Up
        </button>

      </div>

      <!-- LOGIN -->
      <form
        class="auth-form active"
        id="loginForm"
      >

        <h2>
          Welcome Back
        </h2>

        <!-- EMAIL -->
        <div class="input-group">

          <input
            type="email"
            id="loginEmail"
            placeholder="Email"
          />

          <small class="error"></small>

        </div>

        <!-- PASSWORD -->
        <div class="input-group password-group">

          <input
            type="password"
            id="loginPassword"
            placeholder="Password"
          />

          <i
            class="fa-solid fa-eye toggle-password"
          ></i>

          <small class="error"></small>

        </div>

        <!-- FORGOT -->
        <a
          href="#"
          class="forgot-password"
        >
          Forgot Password?
        </a>

        <button type="submit">

          Login

        </button>

      </form>

      <!-- SIGNUP -->
      <form
        class="auth-form"
        id="signupForm"
      >

        <h2>
          Create Account
        </h2>

        <!-- NAME -->
        <div class="input-group">

          <input
            type="text"
            id="signupName"
            placeholder="Full Name"
          />

          <small class="error"></small>

        </div>

        <!-- EMAIL -->
        <div class="input-group">

          <input
            type="email"
            id="signupEmail"
            placeholder="Email"
          />

          <small class="error"></small>

        </div>

        <!-- PASSWORD -->
        <div class="input-group password-group">

          <input
            type="password"
            id="signupPassword"
            placeholder="Password"
          />

          <i
            class="fa-solid fa-eye toggle-password"
          ></i>

          <small class="error"></small>

        </div>

        <!-- STRENGTH -->
        <div
          class="password-strength"
          id="passwordStrength"
        >
          Weak
        </div>

        <!-- CONFIRM -->
        <div class="input-group">

          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
          />

          <small class="error"></small>

        </div>

        <button type="submit">

          Sign Up

        </button>

      </form>

    </div>

  </section>

  <script type="module" src="scripts/auth.js"></script>

</body>

</html>
